<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Clean Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="auth-modal" class="auth-modal">
    <div class="auth-card">
      <div class="auth-card-header">
        <div class="auth-icon">🔐</div>
        <h3>权限验证</h3>
        <p>请输入开机密码</p>
      </div>
      <input type="password" id="psw-input" class="auth-input" placeholder="输入密码...">
      <div class="auth-actions">
        <button id="auth-cancel-btn" class="btn-ghost" onclick="closeAuthModal()">取消</button>
        <button id="auth-confirm-btn" class="btn-scan" onclick="confirmPassword()">确认</button>
      </div>
    </div>
  </div>
  <div id="loader" class="loader-overlay">
    <div class="loader-card">
      <div class="loader-brand">
        <div class="loader-brand-icon">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <circle cx="18" cy="18" r="16" stroke="url(#lg)" stroke-width="2.5" stroke-linecap="round"
              stroke-dasharray="6 4" />
            <circle cx="18" cy="18" r="7" fill="url(#lg2)" opacity="0.9" />
            <defs>
              <linearGradient id="lg" x1="2" y1="2" x2="34" y2="34" gradientUnits="userSpaceOnUse">
                <stop stop-color="#3a86ff" />
                <stop offset="1" stop-color="#8b5cf6" />
              </linearGradient>
              <linearGradient id="lg2" x1="11" y1="11" x2="25" y2="25" gradientUnits="userSpaceOnUse">
                <stop stop-color="#3a86ff" />
                <stop offset="1" stop-color="#14c38e" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="loader-brand-name">Deep Clean Pro</span>
      </div>
      <div class="loader-body">
        <div id="loader-status" class="loader-status-text">正在准备系统扫描...</div>
        <div class="loader-progress-wrap">
          <div class="loader-progress-track">
            <div class="loader-progress-fill" id="p-fill"></div>
          </div>
        </div>
        <div id="loader-detail" class="loader-detail-text">验证成功后将开始全面扫描</div>
      </div>
    </div>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img class="logo-icon" src="logo.png">
        <div class="logo-text-wrap">
          <span class="logo-name">Deep Clean <span class="badge-pro">Pro</span></span>
          <span class="logo-ver">深度清理工具</span>
        </div>
      </div>
      <div class="sidebar-nav-section">主功能</div>
      <div class="menu-item active" id="menu-dashboard" onclick="switchView('dashboard')">
        <span class="menu-icon">⌘</span>
        <span class="menu-label">仪表板</span>
        <span class="size-val" id="side-total">0 KB</span>
      </div>
      <div class="menu-item" id="menu-optimize" onclick="switchView('optimize')">
        <span class="menu-icon">❖</span>
        <span class="menu-label">优化系统</span>
      </div>
      <div class="menu-item" id="menu-whitelist" onclick="switchView('whitelist')">
        <span class="menu-icon">✦</span>
        <span class="menu-label">白名单</span>
      </div>
      <div class="sidebar-nav-section">扫描分类</div>
      <div id="side-menu"></div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="topbar-title" id="view-title">深度清理</div>
          <div class="topbar-subtitle">
            可释放空间：<span id="top-total-size" class="topbar-size">0 KB</span>
          </div>
        </div>
        <div class="topbar-actions">
          <div id="scan-action">
            <button class="btn-scan" id="scan-btn" onclick="handleScan()">深度扫描</button>
            <button class="btn-clean" id="master-clean" style="display:none" onclick="handleClean()">清理垃圾</button>
          </div>
          <div id="optimize-action" style="display: none;">
            <button class="btn-scan" id="optimize-btn" onclick="runOptimize()" data-view="optimize">开始优化</button>
          </div>
        </div>
      </header>
      <div class="view-body" id="view-body">
        <div class="empty-hint">
          <div class="empty-icon">🚀</div>
          <div class="empty-title">点击上方按钮开始扫描</div>
          <div class="empty-desc">全面扫描将分析所有分类的垃圾文件</div>
        </div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
